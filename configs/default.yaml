data:
  tickers: ["BTC/USDT", "ETH/USDT", "AAPL"]
  interval: "1d"
  period: "5y"
  # Per-ticker overrides for interval/period
  ticker_overrides:
    "BTC/USDT":
      interval: "1h"
      period: "1y"
    "ETH/USDT":
      interval: "1h"
      period: "1y"

model:
  types: ["lstm", "transformer"]
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.2

training:
  seq_len: 30
  epochs: 50
  batch_size: 32
  lr: 0.001

evaluation:
  train_size: 500
  test_size: 60
  step_size: 60
  cost_bps: 10.0
  # Cycle 3: purge gap between train and test to prevent sequence overlap leakage
  purge_gap: 5
  # Cycle 3: adaptive window sizing for datasets with few samples
  adaptive_window: true
  # Cycle 3: cost sensitivity analysis at multiple levels (basis points)
  cost_sensitivity_bps: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0]
  # Cycle 4: minimum holding period to reduce trade churn (periods)
  min_holding_period: 3
  # Cycle 4: feature importance analysis (permutation-based)
  feature_importance: true
  # Cycle 4: ensemble averaging of LSTM + Transformer predictions
  ensemble: true
