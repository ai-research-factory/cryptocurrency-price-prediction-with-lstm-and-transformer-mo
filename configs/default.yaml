data:
  ticker: "AAPL"
  interval: "1d"
  period: "5y"

model:
  types: ["lstm", "transformer"]
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.2

training:
  seq_len: 30
  epochs: 50
  batch_size: 32
  lr: 0.001

evaluation:
  train_size: 500
  test_size: 60
  step_size: 60
  cost_bps: 10.0
