data:
  tickers: ["AAPL", "SPY"]
  interval: "1d"
  period: "5y"
  # Per-ticker overrides for interval/period
  ticker_overrides:
    "BTC/USDT":
      interval: "1h"
      period: "1y"
    "ETH/USDT":
      interval: "1h"
      period: "1y"

model:
  # Cycle 6: Added GRU as third model type for ensemble diversity
  types: ["lstm", "gru", "transformer"]
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  gru:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.2

training:
  seq_len: 30
  epochs: 15
  batch_size: 32
  lr: 0.001

evaluation:
  train_size: 500
  test_size: 60
  step_size: 60
  cost_bps: 10.0
  # Cycle 3: purge gap between train and test to prevent sequence overlap leakage
  purge_gap: 5
  # Cycle 3: adaptive window sizing for datasets with few samples
  adaptive_window: true
  # Cycle 3: cost sensitivity analysis at multiple levels (basis points)
  cost_sensitivity_bps: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0]
  # Cycle 4: minimum holding period to reduce trade churn (periods)
  min_holding_period: 3
  # Cycle 4: feature importance analysis (disabled to save compute)
  feature_importance: false
  # Cycle 4/5: ensemble averaging of all model predictions
  ensemble: true
  # Cycle 5: direction classification mode (BCE loss, sigmoid output)
  classification: true
  # Cycle 5: allow short positions (long/short/flat strategy)
  allow_short: true
  # Cycle 5: ensemble method - "equal" or "inverse_variance"
  ensemble_method: "inverse_variance"
  # Cycle 5: min holding period sweep
  min_hold_sweep: [1, 2, 3, 5, 10]
  # Cycle 6: sequence length sensitivity sweep
  seq_len_sweep: [10, 20, 30, 50]
  # Cycle 6: adaptive per-ticker hold period (selects best from sweep)
  adaptive_hold: true
  # Cycle 7: adaptive per-model-ticker seq_len (selects best from sweep)
  adaptive_seq_len: true
  # Cycle 7: Transformer warm-up epochs for better convergence
  warmup_epochs: 5
  # Cycle 7: volatility-regime-based short toggling
  regime_short: true
  vol_lookback: 60
  high_vol_threshold: 1.5
  # Cycle 8: early stopping to reduce overfitting (patience in epochs, 0=disabled)
  early_stopping_patience: 5
  # Cycle 8: per-ticker regime threshold calibration
  regime_threshold_sweep: [1.0, 1.25, 1.5, 2.0, 2.5]
  # Cycle 8: per-model hidden size search
  hidden_size_sweep: [32, 64, 128]
  adaptive_hidden_size: true
  # Cycle 9: per-model num_layers search
  num_layers_sweep: [1, 2, 3]
  adaptive_num_layers: true
  # Cycle 9: selective ensemble (drop models with Sharpe below threshold)
  selective_ensemble: true
  selective_ensemble_threshold: 0.0
  # Cycle 10: multi-seed averaging (average predictions across N seeds)
  n_seeds: 2
  # Cycle 10: joint hyperparameter search (replaces sequential hs/nl/sl sweeps)
  joint_search: true
  joint_search_samples: 6
  # Cycle 10: adaptive mode selection (auto-select regression vs classification)
  adaptive_mode: true
